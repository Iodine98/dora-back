summary: Clear chat history
description: Clears the chat history for the current session.
responses:
  '200':
    description: Successfully cleared chat history.
    content:
      application/json:
        schema:
          type: object
          properties:
            message:
              type: string
              description: Success message.
            error:
              type: string
              description: Error message, if any.
  '400':
    description: Error message if there is a problem with the request.
    content:
      application/json:
        schema:
          type: object
          properties:
            message:
              type: string
              description: Error message.
            error:
              type: string
              description: Error details.