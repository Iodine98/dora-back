name: dora-services
services:
  dora-mariadb:
    image: mariadb:latest
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MYSQL_DATABASE: experiment
    labels:
      kompose.service.type: nodeport
      kompose.volume.type: hostPath

  dora-backend:
    image: docker.io/library/dora-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    develop:
      watch:
        - action: rebuild
          path: .
    ports:
      - "8000:8000"
    restart: "always"
    env_file:
      - ".env"
    volumes:
      - logging_file_dir:/app/logs
      - chat_model_folder:/models/chat_models
      - embedding_model_folder:/models/embedding_model
    depends_on:
      - dora-mariadb
    labels:
      kompose.service.type: nodeport
      kompose.volume.type: hostPath
      kompose.image-pull-policy: "Never"

volumes:
  logging_file_dir:
  mariadb_data:
  chat_model_folder:
    external: true
    name: ${CHAT_MODEL_FOLDER_PATH:?error}
  embedding_model_folder:
    external: true
    name: ${SENTENCE_TRANSFORMERS_HOME:?error}
