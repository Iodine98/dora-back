name: dora-services
services:
  dora-mariadb:
    image: mariadb:latest
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    env_file:
      - path: "./settings/.mariadb.env"
        required: true
    labels:
      kompose.service.type: nodeport
      kompose.volume.type: hostPath

  dora-backend:
    image: docker.io/library/dora-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    develop:
      watch:
        - action: rebuild
          path: .
    ports:
      - "8000:8000"
      - "5678:5678"
    restart: "always"
    env_file:
      - path: ".env"
        required: true
      - path: "./settings/.app.env"
        required: true
      - path: "./settings/.retrieval.env"
        required: true
      - path: "./settings/.mariadb.env"
        required: true
      - path: "./settings/.model.env"
        required: true
    volumes:
      - logging_file_dir:/app/logs
      - chat_model_folder:/models/chat_models
      - embedding_model_folder:/models/embedding_model
    depends_on:
      - dora-mariadb
    labels:
      kompose.service.type: nodeport
      kompose.volume.type: hostPath
      kompose.image-pull-policy: "Never"

volumes:
  logging_file_dir:
  mariadb_data:
  chat_model_folder:
    driver: local
    driver_opts:
     type: none
     o: bind
     device: ${CHAT_MODEL_FOLDER_PATH:?error}
  embedding_model_folder:
    driver: local
    driver_opts:
     type: none
     o: bind
     device: ${EMBEDDING_MODEL_FOLDER_PATH:?error}
